<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth Callback - FlowBooks</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 100px auto;
      padding: 20px;
      text-align: center;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4285F4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success { color: #34A853; }
    .error { color: #EA4335; }
    pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 4px;
      text-align: left;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Processing OAuth Callback</h1>
  <div class="spinner"></div>
  <div id="status">Exchanging code for session...</div>
  <div id="details" style="margin-top: 20px;"></div>

  <script>
    const SUPABASE_URL = 'https://dvujgsngjgurrrjrsvgn.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2dWpnc25namd1cnJyanJzdmduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTEwODUsImV4cCI6MjA5MTc2NzA4NX0.hZZfbTlnFSAcBPEefBPXGajnx5tj7ntdD7BMxn6hYuw';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        storage: localStorage,
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: 'pkce',
      }
    });

    async function handleCallback() {
      const statusDiv = document.getElementById('status');
      const detailsDiv = document.getElementById('details');
      
      try {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const errorDescription = params.get('error_description');

        detailsDiv.innerHTML = `<pre>URL Parameters:\n${JSON.stringify({
          code: code ? code.substring(0, 20) + '...' : null,
          error,
          errorDescription
        }, null, 2)}</pre>`;

        if (error) {
          statusDiv.innerHTML = `<div class="error">❌ OAuth Error: ${errorDescription || error}</div>`;
          setTimeout(() => {
            window.location.href = '/test-oauth.html';
          }, 3000);
          return;
        }

        if (!code) {
          statusDiv.innerHTML = '<div class="error">❌ No authorization code received</div>';
          setTimeout(() => {
            window.location.href = '/test-oauth.html';
          }, 3000);
          return;
        }

        const { data, error: exchangeError } = await supabase.auth.exchangeCodeForSession(code);

        if (exchangeError) {
          statusDiv.innerHTML = `<div class="error">❌ Failed to exchange code: ${exchangeError.message}</div>`;
          detailsDiv.innerHTML += `<pre>Error Details:\n${JSON.stringify(exchangeError, null, 2)}</pre>`;
          setTimeout(() => {
            window.location.href = '/test-oauth.html';
          }, 5000);
          return;
        }

        statusDiv.innerHTML = `<div class="success">✅ OAuth Successful!</div>`;
        detailsDiv.innerHTML = `<pre>Session Data:\n${JSON.stringify({
          email: data.session.user.email,
          provider: data.session.user.app_metadata.provider,
          userId: data.session.user.id
        }, null, 2)}</pre>`;

        setTimeout(() => {
          window.location.href = '/test-oauth.html';
        }, 2000);

      } catch (err) {
        statusDiv.innerHTML = `<div class="error">❌ Unexpected error: ${err.message}</div>`;
        detailsDiv.innerHTML += `<pre>Error:\n${JSON.stringify(err, null, 2)}</pre>`;
        setTimeout(() => {
          window.location.href = '/test-oauth.html';
        }, 5000);
      }
    }

    window.addEventListener('DOMContentLoaded', handleCallback);
  </script>
</body>
</html>
