<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth Test - FlowBooks</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #333; margin-top: 0; }
    .test-section {
      margin: 20px 0;
      padding: 15px;
      background: #f9f9f9;
      border-left: 4px solid #4285F4;
    }
    .success { border-left-color: #34A853; background: #f0fdf4; }
    .error { border-left-color: #EA4335; background: #fef2f2; }
    .warning { border-left-color: #FBBC05; background: #fffbeb; }
    button {
      background: #4285F4;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    button:hover { background: #357ae8; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
    }
    .status { font-weight: 600; margin-bottom: 10px; }
    .log { margin: 5px 0; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 FlowBooks OAuth Test Suite</h1>
    
    <div id="env-check" class="test-section">
      <div class="status">1️⃣ Environment Variables</div>
      <div id="env-result">Checking...</div>
    </div>

    <div id="supabase-check" class="test-section">
      <div class="status">2️⃣ Supabase Connection</div>
      <div id="supabase-result">Checking...</div>
    </div>

    <div id="auth-check" class="test-section">
      <div class="status">3️⃣ Current Session</div>
      <div id="auth-result">Checking...</div>
    </div>

    <div id="oauth-test" class="test-section">
      <div class="status">4️⃣ Google OAuth Test</div>
      <button id="test-google-btn" onclick="testGoogleOAuth()">Test Google Sign In</button>
      <button onclick="testSignOut()">Sign Out</button>
      <div id="oauth-result" style="margin-top: 10px;"></div>
    </div>

    <div id="callback-check" class="test-section">
      <div class="status">5️⃣ Callback Handler</div>
      <div id="callback-result">Waiting for OAuth callback...</div>
    </div>

    <div id="logs" class="test-section">
      <div class="status">📋 Logs</div>
      <div id="log-output"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dvujgsngjgurrrjrsvgn.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2dWpnc25namd1cnJyanJzdmduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTEwODUsImV4cCI6MjA5MTc2NzA4NX0.hZZfbTlnFSAcBPEefBPXGajnx5tj7ntdD7BMxn6hYuw';

    let supabase;
    const logs = [];

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      logs.push({ timestamp, message, type });
      updateLogs();
    }

    function updateLogs() {
      const output = document.getElementById('log-output');
      output.innerHTML = logs.map(l => 
        `<div class="log" style="color: ${l.type === 'error' ? '#EA4335' : l.type === 'success' ? '#34A853' : '#666'}">
          [${l.timestamp}] ${l.message}
        </div>`
      ).join('');
    }

    // Test 1: Environment Variables
    function checkEnvironment() {
      const envDiv = document.getElementById('env-result');
      if (SUPABASE_URL && SUPABASE_KEY) {
        envDiv.innerHTML = `
          <div style="color: #34A853;">✅ Environment variables loaded</div>
          <div style="font-size: 12px; margin-top: 5px;">
            URL: ${SUPABASE_URL}<br>
            Key: ${SUPABASE_KEY.substring(0, 20)}...
          </div>
        `;
        document.getElementById('env-check').classList.add('success');
        log('Environment variables validated', 'success');
        return true;
      } else {
        envDiv.innerHTML = '<div style="color: #EA4335;">❌ Missing environment variables</div>';
        document.getElementById('env-check').classList.add('error');
        log('Missing environment variables', 'error');
        return false;
      }
    }

    // Test 2: Supabase Connection
    async function checkSupabase() {
      const supabaseDiv = document.getElementById('supabase-result');
      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
          auth: {
            storage: localStorage,
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            flowType: 'pkce',
          }
        });
        
        const { data, error } = await supabase.auth.getSession();
        
        if (error) throw error;
        
        supabaseDiv.innerHTML = '<div style="color: #34A853;">✅ Supabase client initialized</div>';
        document.getElementById('supabase-check').classList.add('success');
        log('Supabase connection successful', 'success');
        return true;
      } catch (error) {
        supabaseDiv.innerHTML = `<div style="color: #EA4335;">❌ Connection failed: ${error.message}</div>`;
        document.getElementById('supabase-check').classList.add('error');
        log(`Supabase connection failed: ${error.message}`, 'error');
        return false;
      }
    }

    // Test 3: Current Session
    async function checkSession() {
      const authDiv = document.getElementById('auth-result');
      try {
        const { data: { session }, error } = await supabase.auth.getSession();
        
        if (error) throw error;
        
        if (session) {
          authDiv.innerHTML = `
            <div style="color: #34A853;">✅ Active session found</div>
            <div style="font-size: 12px; margin-top: 5px;">
              User: ${session.user.email}<br>
              Provider: ${session.user.app_metadata.provider || 'email'}
            </div>
          `;
          document.getElementById('auth-check').classList.add('success');
          log(`Active session: ${session.user.email}`, 'success');
        } else {
          authDiv.innerHTML = '<div style="color: #666;">ℹ️ No active session</div>';
          document.getElementById('auth-check').classList.add('warning');
          log('No active session', 'info');
        }
      } catch (error) {
        authDiv.innerHTML = `<div style="color: #EA4335;">❌ Error: ${error.message}</div>`;
        document.getElementById('auth-check').classList.add('error');
        log(`Session check failed: ${error.message}`, 'error');
      }
    }

    // Test 4: Google OAuth
    async function testGoogleOAuth() {
      const resultDiv = document.getElementById('oauth-result');
      const btn = document.getElementById('test-google-btn');
      
      btn.disabled = true;
      resultDiv.innerHTML = '<div style="color: #666;">🔄 Initiating Google OAuth...</div>';
      log('Starting Google OAuth flow');

      try {
        const redirectUrl = `${window.location.origin}/test-oauth-callback.html`;
        log(`Redirect URL: ${redirectUrl}`);

        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: redirectUrl,
          }
        });

        if (error) throw error;

        log('OAuth initiated, redirecting to Google...', 'success');
        resultDiv.innerHTML = '<div style="color: #34A853;">✅ Redirecting to Google...</div>';
        
        // The page will redirect, so this won't execute
      } catch (error) {
        resultDiv.innerHTML = `<div style="color: #EA4335;">❌ OAuth failed: ${error.message}</div>`;
        log(`OAuth failed: ${error.message}`, 'error');
        btn.disabled = false;
      }
    }

    // Sign Out
    async function testSignOut() {
      try {
        await supabase.auth.signOut();
        log('Signed out successfully', 'success');
        await checkSession();
      } catch (error) {
        log(`Sign out failed: ${error.message}`, 'error');
      }
    }

    // Test 5: Check for OAuth callback
    async function checkCallback() {
      const callbackDiv = document.getElementById('callback-result');
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');
      const errorDescription = params.get('error_description');

      if (error) {
        callbackDiv.innerHTML = `
          <div style="color: #EA4335;">❌ OAuth Error</div>
          <div style="font-size: 12px; margin-top: 5px;">
            Error: ${error}<br>
            Description: ${errorDescription || 'N/A'}
          </div>
        `;
        document.getElementById('callback-check').classList.add('error');
        log(`OAuth error: ${error} - ${errorDescription}`, 'error');
        return;
      }

      if (code) {
        callbackDiv.innerHTML = '<div style="color: #FBBC05;">🔄 Processing OAuth code...</div>';
        log('OAuth code received, exchanging for session');

        try {
          const { data, error } = await supabase.auth.exchangeCodeForSession(code);
          
          if (error) throw error;

          callbackDiv.innerHTML = `
            <div style="color: #34A853;">✅ OAuth successful!</div>
            <div style="font-size: 12px; margin-top: 5px;">
              User: ${data.session.user.email}<br>
              Provider: ${data.session.user.app_metadata.provider}
            </div>
          `;
          document.getElementById('callback-check').classList.add('success');
          log(`OAuth successful: ${data.session.user.email}`, 'success');
          
          await checkSession();
        } catch (error) {
          callbackDiv.innerHTML = `<div style="color: #EA4335;">❌ Session exchange failed: ${error.message}</div>`;
          document.getElementById('callback-check').classList.add('error');
          log(`Session exchange failed: ${error.message}`, 'error');
        }
      } else {
        callbackDiv.innerHTML = '<div style="color: #666;">ℹ️ No callback parameters detected</div>';
        log('No OAuth callback detected');
      }
    }

    // Run all tests on load
    async function runTests() {
      log('Starting OAuth test suite');
      
      if (!checkEnvironment()) return;
      
      if (!await checkSupabase()) return;
      
      await checkSession();
      await checkCallback();
      
      log('Test suite completed');
    }

    window.addEventListener('DOMContentLoaded', runTests);
  </script>
</body>
</html>
